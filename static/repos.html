<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>tgr-hash</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pixelify Sans', sans-serif;
            background-color: #0f0f0f;
            color: white;
        }

        .container {
            text-align: center;
            margin-top: 20vh;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            color: white;
            border: 2px solid white;
            padding: 15px 30px;
            font-size: 24px;
            transition: 0.2s;
            min-width: 180px; /* keeps size consistent */
            text-align: center;
        }

        .btn:hover {
            background-color: white;
            color: black;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="buttons">
            <a href="/" class="btn">Back to Homepage</a>
            <a href="https://github.com/tgr-hash/chat" class="btn">Chat</a>
            <a href="https://github.com/tgr-hash/App" class="btn">Homepage</a>
        </div>
    </div>
</body>
</html>
